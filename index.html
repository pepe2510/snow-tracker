<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪齡計算器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc,
    doc, getDoc, query, orderBy, serverTimestamp, writeBatch, getDocs }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBFWZcPwH8D5rr5UJcUMOTQEZ6mzptkkFY",
    authDomain:        "snow-age-calculator.firebaseapp.com",
    projectId:         "snow-age-calculator",
    storageBucket:     "snow-age-calculator.firebasestorage.app",
    messagingSenderId: "527060791092",
    appId:             "1:527060791092:web:0e96e161c944016030ff61"
  };

  const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app), COL='ski-entries';
  let unsubscribe=null;

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('mainApp').style.display='flex';
      document.getElementById('userEmail').textContent=user.email;
      const av=document.getElementById('userAvatar');
      av.src=user.photoURL||''; av.style.display=user.photoURL?'block':'none';
      startListening(user.uid);
    } else {
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('mainApp').style.display='none';
      if(unsubscribe){unsubscribe();unsubscribe=null;}
      window.entries=[]; hideLoading();
    }
  });

  function startListening(uid){
    if(unsubscribe)unsubscribe();
    unsubscribe=onSnapshot(query(collection(db,'users',uid,COL),orderBy('createdAt','asc')),
      snap=>{ window.entries=snap.docs.map(d=>({id:d.id,...d.data()})); onEntriesUpdated(); setSyncStatus('synced','已同步'); hideLoading(); },
      err=>{ setSyncStatus('error','連線失敗'); hideLoading(); }
    );
  }

  window._fbSignIn=async()=>{ try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){showToast('登入失敗：'+e.message);} };
  window._fbSignOut=async()=>{ if(!confirm('確定要登出？'))return; await signOut(auth); };
  window._fbAdd=async(entry)=>{ const uid=auth.currentUser?.uid; if(!uid)throw new Error('未登入'); const{id,...data}=entry; await addDoc(collection(db,'users',uid,COL),{...data,createdAt:serverTimestamp()}); };
  window._fbUpdate=async(id,data)=>{ const uid=auth.currentUser?.uid; if(!uid)throw new Error('未登入'); await updateDoc(doc(db,'users',uid,COL,id),data); };
  window._fbDelete=async(id)=>{ const uid=auth.currentUser?.uid; if(!uid)throw new Error('未登入'); await deleteDoc(doc(db,'users',uid,COL,id)); };
  window._fbClearAll=async()=>{ const uid=auth.currentUser?.uid; if(!uid)throw new Error('未登入'); const snap=await getDocs(collection(db,'users',uid,COL)); const batch=writeBatch(db); snap.forEach(d=>batch.delete(d.ref)); await batch.commit(); };
  window._fbPublishShare=async()=>{
    const uid=auth.currentUser?.uid; if(!uid)throw new Error('未登入');
    const snap=await getDocs(collection(db,'users',uid,COL));
    const data=snap.docs.map(d=>{ const d2={...d.data()}; delete d2.createdAt; return d2; });
    await setDoc(doc(db,'public_shares',uid),{uid,entries:data,updatedAt:serverTimestamp()});
  };
  window._fbReadShare=async(uid)=>{
    const snap=await getDoc(doc(db,'public_shares',uid));
    if(!snap.exists())throw new Error('找不到分享紀錄');
    return snap.data();
  };
  window._fbCurrentUid=()=>auth.currentUser?.uid||null;
</script>

<style>
:root{
  --bg:#0a0e1a; --surface:#111827; --card:#1a2235; --border:#2a3a55;
  --accent:#7dd3fc; --accent2:#38bdf8; --snow:#e0f2fe; --text:#cbd5e1;
  --muted:#64748b; --danger:#f87171; --success:#4ade80;
  --tap:48px; --tab-h:56px; --total-h:80px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;overflow:hidden;}

/* Snow */
.snow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.flake{position:absolute;top:-20px;color:rgba(224,242,254,0.2);font-size:1rem;animation:fall linear infinite;user-select:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

/* Loading */
.loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--snow);letter-spacing:0.1em;}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.85rem;color:var(--muted);}

/* Toast */
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%) translateY(80px);background:#1e3a5f;border:1px solid var(--accent);border-radius:12px;padding:11px 22px;font-size:0.88rem;color:var(--snow);transition:transform 0.3s ease;z-index:600;white-space:nowrap;max-width:88vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── Login ── */
#loginScreen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:var(--bg);padding:20px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,15vw,7rem);color:var(--snow);letter-spacing:0.08em;line-height:1;text-shadow:0 0 60px rgba(125,211,252,0.5);}
.login-subtitle{color:var(--muted);font-size:0.9rem;letter-spacing:0.15em;margin-top:-16px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;text-align:center;width:100%;max-width:360px;}
.login-card h2{font-size:1.05rem;color:var(--snow);margin-bottom:8px;}
.login-card p{font-size:0.85rem;color:var(--muted);margin-bottom:24px;line-height:1.7;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:15px 20px;background:#fff;border:none;border-radius:12px;font-family:'Noto Serif TC',serif;font-size:1rem;color:#1f2937;cursor:pointer;font-weight:700;box-shadow:0 2px 16px rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;}
.btn-google:active{transform:scale(0.97);}

/* ── Main app shell ── */
#mainApp{display:none;flex-direction:column;height:100dvh;height:100vh;position:relative;z-index:1;}

/* Persistent total bar */
.total-bar{flex-shrink:0;height:var(--total-h);background:linear-gradient(135deg,#0c3d5c,#142d47);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;}
.total-bar-left{display:flex;flex-direction:column;}
.total-bar-days{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--snow);line-height:1;text-shadow:0 0 20px rgba(125,211,252,0.5);}
.total-bar-unit{font-size:0.72rem;color:var(--muted);letter-spacing:0.08em;}
.total-bar-right{flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ski-age-badge{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);border-radius:8px;padding:4px 10px;font-size:0.78rem;color:var(--accent);}
.sync-row{display:flex;align-items:center;gap:5px;font-size:0.68rem;color:var(--muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.4s;}
.sync-dot.synced{background:var(--success);box-shadow:0 0 5px rgba(74,222,128,0.6);}
.sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Tab bar */
.tab-bar{flex-shrink:0;height:var(--tab-h);display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:'Noto Serif TC',serif;font-size:0.7rem;letter-spacing:0.05em;-webkit-tap-highlight-color:transparent;position:relative;transition:color 0.2s;}
.tab-btn .tab-icon{font-size:1.2rem;line-height:1;}
.tab-btn.active{color:var(--accent2);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent2);border-radius:2px 2px 0 0;}

/* Scrollable tab content */
.tab-content{flex:1;overflow:hidden;position:relative;}
.tab-pane{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px 16px 24px;}
.tab-pane.active{display:block;}

/* ── HOME TAB ── */
.home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.home-title{font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;}
.user-mini{display:flex;align-items:center;gap:6px;}
.user-avatar{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);object-fit:cover;}
.btn-signout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:0.68rem;padding:3px 9px;cursor:pointer;font-family:'Noto Serif TC',serif;min-height:28px;}

.recent-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.entry-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.2s;}
.entry-card:active{border-color:var(--accent2);background:#1e2d40;}
.entry-num{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--accent);min-width:28px;text-align:center;line-height:1;}
.entry-info{flex:1;min-width:0;}
.entry-resort{font-size:0.95rem;color:var(--snow);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-location{font-size:0.7rem;color:var(--accent2);margin-bottom:2px;}
.entry-meta{font-size:0.7rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
.entry-days-col{text-align:right;}
.entry-days{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent2);line-height:1;}
.entry-days-label{font-size:0.65rem;color:var(--muted);}

.btn-see-all{width:100%;background:none;border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-family:'Noto Serif TC',serif;font-size:0.85rem;padding:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.2s,color 0.2s;}
.btn-see-all:active{border-color:var(--accent2);color:var(--accent2);}

/* Add form card */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
.section-title{font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}
.form-col{display:flex;flex-direction:column;gap:11px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
label{font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;}
input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-family:'Noto Serif TC',serif;font-size:1rem;outline:none;width:100%;min-height:var(--tap);-webkit-appearance:none;}
input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(56,189,248,0.1);}
.btn-add{width:100%;margin-top:14px;background:linear-gradient(135deg,#0369a1,#0284c7);border:none;border-radius:12px;color:#fff;font-family:'Noto Serif TC',serif;font-size:1rem;padding:14px;cursor:pointer;min-height:var(--tap);-webkit-tap-highlight-color:transparent;}
.btn-add:active{opacity:0.85;}
.btn-add:disabled{opacity:0.5;}

/* Autocomplete */
.resort-wrap{position:relative;}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--accent2);border-radius:10px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.5);max-height:200px;overflow-y:auto;}
.autocomplete-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:1px;-webkit-tap-highlight-color:transparent;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:active{background:rgba(56,189,248,0.12);}
.autocomplete-name{color:var(--snow);font-size:0.9rem;}
.autocomplete-meta{font-size:0.72rem;color:var(--muted);}
.autocomplete-manual{color:var(--accent);font-size:0.82rem;}
.location-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);border-radius:20px;padding:3px 10px;font-size:0.72rem;color:var(--accent2);}

/* ── RECORDS TAB ── */
.records-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.records-label{font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;}
.toolbar-right{display:flex;gap:6px;}
.btn-sm{background:none;border:1px solid var(--border);border-radius:8px;color:var(--accent);font-size:0.72rem;padding:5px 10px;cursor:pointer;font-family:'Noto Serif TC',serif;min-height:32px;display:flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent;}
.btn-sm.danger{border-color:rgba(248,113,113,0.3);color:var(--danger);}

/* Filter */
.filter-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.filter-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;min-height:44px;-webkit-tap-highlight-color:transparent;}
.filter-title{font-size:0.7rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.filter-badge{background:var(--accent2);color:#0a0e1a;border-radius:20px;font-size:0.65rem;padding:2px 7px;font-weight:700;display:none;}
.filter-badge.on{display:inline-block;}
.filter-chevron{color:var(--muted);transition:transform 0.3s;}
.filter-chevron.open{transform:rotate(180deg);}
.filter-body{display:none;padding:0 16px 14px;}
.filter-body.open{display:block;}
.filter-group-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin:8px 0 5px;}
.filter-chips-row{display:flex;flex-wrap:wrap;gap:5px;}
.filter-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:0.78rem;color:var(--muted);cursor:pointer;min-height:32px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;}
.filter-chip.active{background:rgba(56,189,248,0.15);border-color:var(--accent2);color:var(--accent2);}
.filter-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.filter-result{font-size:0.72rem;color:var(--muted);}
.btn-reset{background:none;border:none;color:var(--muted);font-size:0.72rem;font-family:'Noto Serif TC',serif;cursor:pointer;text-decoration:underline;padding:4px 0;}

.entries-list{display:flex;flex-direction:column;gap:8px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.88rem;border:1px dashed var(--border);border-radius:14px;line-height:1.8;}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}

/* ── TOOLS TAB ── */
.tools-section{margin-bottom:20px;}
.tools-section-title{font-size:0.68rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.tools-grid{display:flex;flex-direction:column;gap:8px;}
.tool-btn{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;width:100%;text-align:left;transition:border-color 0.2s;}
.tool-btn:active{border-color:var(--accent2);}
.tool-icon{font-size:1.6rem;flex-shrink:0;}
.tool-text{}
.tool-title{font-size:0.92rem;color:var(--snow);margin-bottom:2px;}
.tool-desc{font-size:0.72rem;color:var(--muted);line-height:1.4;}
.tool-btn.green .tool-title{color:var(--success);}
.tool-btn.green{border-color:rgba(74,222,128,0.2);}

/* ── Edit modal ── */
.modal-backdrop{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:600px;transform:translateY(100%);transition:transform 0.32s cubic-bezier(.32,1,.23,1);max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px);}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;}
.modal-title{font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;}
.btn-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:flex-end;}
.modal-body{padding:14px 18px 8px;}
.modal-actions{display:flex;gap:10px;padding:8px 18px 16px;}
.btn-save{flex:1;background:linear-gradient(135deg,#0369a1,#0284c7);border:none;border-radius:12px;color:#fff;font-family:'Noto Serif TC',serif;font-size:1rem;padding:14px;cursor:pointer;min-height:var(--tap);}
.btn-save:active{opacity:0.85;} .btn-save:disabled{opacity:0.5;}
.btn-modal-delete{background:none;border:1px solid rgba(248,113,113,0.35);border-radius:12px;color:var(--danger);font-family:'Noto Serif TC',serif;font-size:0.9rem;padding:14px 16px;cursor:pointer;min-height:var(--tap);}
.btn-modal-delete:active{background:rgba(248,113,113,0.1);}

/* Share modal */
.share-url-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:0.8rem;color:var(--muted);word-break:break-all;margin:12px 0;line-height:1.5;}
.share-url-box.ready{color:var(--accent2);border-color:rgba(56,189,248,0.3);}

/* Import modal */
.import-preview-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:6px;}

/* View-only banner */
.view-banner{background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.18);border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:9px;font-size:0.78rem;color:var(--accent);}

/* View-only app */
#viewApp{display:none;flex-direction:column;height:100dvh;height:100vh;}
.view-total-bar{flex-shrink:0;height:var(--total-h);background:linear-gradient(135deg,#0c3d5c,#142d47);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;}
.view-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 24px;}

@media(min-width:480px){.field-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">❄ 雪齡</div>
  <div class="loading-spinner"></div>
  <div class="loading-text">連接中…</div>
</div>
<div class="toast" id="toast"></div>
<div class="snow-bg" id="snowBg"></div>
<input type="file" id="importFileInput" accept=".xls,.xlsx,.csv" style="display:none" onchange="handleImportFile(event)">

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-logo">雪 齡</div>
  <div class="login-subtitle">SKI DAYS TRACKER</div>
  <div class="login-card">
    <h2>登入以繼續</h2>
    <p>使用 Google 帳號登入<br>紀錄安全儲存在雲端</p>
    <button class="btn-google" onclick="window._fbSignIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">

function searchResort(q){
  if(!q||q.length<1)return[];
  const lq=q.toLowerCase().replace(/\s+/g,'');
  return RESORT_DB.map(r=>{
    const names=[r.n,...r.a].map(s=>s.toLowerCase().replace(/\s+/g,''));
    let score=0;
    for(const nm of names){
      if(nm===lq){score=100;break;}
      if(nm.startsWith(lq)){score=Math.max(score,80);}
      else if(nm.includes(lq)){score=Math.max(score,60);}
      else if(lq.length>=2){let m=0;for(const ch of lq)if(nm.includes(ch))m++;if(m/lq.length>0.5)score=Math.max(score,25+m*5);}
    }
    return{resort:r,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,6).map(x=>x.resort);
}

// ══ RECORDS TAB RENDER ════════════════════════════════
function getFiltered(){
  return window.entries.filter(e=>{
    if(activeFilters.country&&(e.country||'')!==activeFilters.country)return false;
    if(activeFilters.area&&(e.area||'')!==activeFilters.area)return false;
    if(activeFilters.year&&String(e.year||'')!==activeFilters.year)return false;
    return true;
  });
}

function renderRecords(){
  const filtered=getFiltered();
  const hasFilter=Object.values(activeFilters).some(v=>v!=='');
  const total=filtered.reduce((s,e)=>s+(e.days||0),0);
  // Update total bar label
  document.getElementById('totalUnit').textContent=hasFilter?`天（篩選：${total}）`:'天';
  document.getElementById('filterResult').textContent=hasFilter?`共 ${filtered.length} 筆・合計 ${total} 天`:'';

  const sorted=[...filtered].sort((a,b)=>{
    const dir=sortOrder==='desc'?-1:1;
    const ak=a.dateStart||a.date||String(a.year||0);
    const bk=b.dateStart||b.date||String(b.year||0);
    return dir*ak.localeCompare(bk);
  });
  const list=document.getElementById('entriesList');
  if(sorted.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">${hasFilter?'🔍':'🏔'}</div>${hasFilter?'沒有符合篩選條件的紀錄':'還沒有任何紀錄'}</div>`;
    return;
  }
  list.innerHTML=sorted.map((e,i)=>entryCardHtml(e,sortOrder==='desc'?sorted.length-i:i+1)).join('');
}

// ══ IMPORT ════════════════════════════════════════════
let importParsed=[];
function triggerImport(){
  document.getElementById('importFileInput').value='';
  document.getElementById('importFileInput').click();
  document.getElementById('importStatus').textContent='請選擇 .xls 或 .csv 檔案';
  document.getElementById('importPreview').style.display='none';
  document.getElementById('btnImportConfirm').style.display='none';
  document.getElementById('importModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeImportModal(){document.getElementById('importModal').classList.remove('open');document.body.style.overflow='';importParsed=[];}
function onImportBackdrop(ev){if(ev.target===document.getElementById('importModal'))closeImportModal();}
function handleImportFile(ev){
  const file=ev.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='csv'){reader.onload=e=>parseCSV(e.target.result,file.name);reader.readAsText(file,'UTF-8');}
  else{reader.onload=e=>parseXLS(e.target.result,file.name);reader.readAsText(file,'UTF-8');}
}
function parseXLS(text,filename){
  try{
    const xmlDoc=new DOMParser().parseFromString(text,'text/xml');
    const rows=xmlDoc.querySelectorAll('Row');
    const results=[];
    rows.forEach((row,idx)=>{
      if(idx===0)return;
      const vals=Array.from(row.querySelectorAll('Cell Data')).map(c=>c.textContent.trim());
      if(vals.length<7)return;
      const resort=vals[1],country=vals[2],area=vals[3],dateStart=vals[4],dateEnd=vals[5],days=parseInt(vals[6]),note=vals[7]||'';
      if(!resort||!days||isNaN(days))return;
      const year=dateStart?parseInt(dateStart.slice(0,4)):(dateEnd?parseInt(dateEnd.slice(0,4)):null);
      if(!year)return;
      results.push({resort,country,area,dateStart,dateEnd,days,note,year});
    });
    if(!results.length){parseCSV(text,filename);return;}
    showImportPreview(results,filename);
  }catch(e){document.getElementById('importStatus').textContent='⚠ 無法解析：'+e.message;}
}
function parseCSV(text,filename){
  try{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){document.getElementById('importStatus').textContent='⚠ 檔案是空的';return;}
    const header=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const ci={resort:header.findIndex(h=>h.includes('雪場')||h.includes('resort')),country:header.findIndex(h=>h.includes('國家')||h.includes('country')),area:header.findIndex(h=>h.includes('地區')||h.includes('area')),dateStart:header.findIndex(h=>h.includes('開始')||h.includes('start')),dateEnd:header.findIndex(h=>h.includes('結束')||h.includes('end')),days:header.findIndex(h=>h.includes('天數')||h.includes('day')),note:header.findIndex(h=>h.includes('備註')||h.includes('note'))};
    if(ci.resort<0||ci.days<0){document.getElementById('importStatus').textContent='⚠ 找不到必要欄位';return;}
    const results=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      const get=idx=>idx>=0&&idx<cols.length?(cols[idx]||'').trim().replace(/^"|"$/g,''):'';
      const resort=get(ci.resort),days=parseInt(get(ci.days));
      if(!resort||!days||isNaN(days))continue;
      const dateStart=get(ci.dateStart),dateEnd=get(ci.dateEnd);
      const year=dateStart?parseInt(dateStart.slice(0,4)):(dateEnd?parseInt(dateEnd.slice(0,4)):null);
      if(!year||isNaN(year))continue;
      results.push({resort,country:get(ci.country),area:get(ci.area),dateStart,dateEnd,days,note:get(ci.note),year});
    }
    showImportPreview(results,filename);
  }catch(e){document.getElementById('importStatus').textContent='⚠ 解析失敗：'+e.message;}
}
function showImportPreview(results,filename){
  importParsed=results;
  if(!results.length){document.getElementById('importStatus').textContent='⚠ 沒有找到有效紀錄';return;}
  document.getElementById('importStatus').textContent=`✓ 「${filename}」找到 ${results.length} 筆紀錄`;
  document.getElementById('importSummary').textContent=`合計 ${results.reduce((s,e)=>s+e.days,0)} 天・共 ${results.length} 筆`;
  document.getElementById('importPreviewList').innerHTML=results.slice(0,5).map(e=>`<div class="import-preview-item"><div style="color:var(--snow);font-size:0.88rem;">${escHtml(e.resort)}</div>${(e.country||e.area)?`<div style="color:var(--accent2);font-size:0.7rem;">📍 ${[e.country,e.area].filter(Boolean).join(' · ')}</div>`:''}<div style="color:var(--muted);font-size:0.7rem;margin-top:1px;">${e.dateStart||''} ${e.dateEnd?'～ '+e.dateEnd:''} · ${e.days} 天</div></div>`).join('')+(results.length>5?`<div style="text-align:center;color:var(--muted);font-size:0.75rem;padding:6px;">… 還有 ${results.length-5} 筆</div>`:'');
  document.getElementById('importPreview').style.display='block';
  document.getElementById('btnImportConfirm').style.display='block';
}
async function confirmImport(){
  if(!importParsed.length)return;
  const btn=document.getElementById('btnImportConfirm');btn.disabled=true;btn.textContent='匯入中…';
  let ok=0,fail=0;
  for(const entry of importParsed){try{await window._fbAdd(entry);ok++;}catch(e){fail++;}}
  btn.disabled=false;btn.textContent='匯入全部';
  closeImportModal();
  showToast(`✓ 匯入完成：${ok} 筆${fail?'（'+fail+' 筆失敗）':''}`);
}

// ══ VIEW-ONLY MODE ════════════════════════════════════
const urlParams=new URLSearchParams(location.search);
const viewUid=urlParams.get('view');
if(viewUid){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('viewApp').style.display='flex';
  hideLoading();
  (async()=>{
    try{
      const data=await window._fbReadShare(viewUid);
      const entries=data.entries||[];
      const total=entries.reduce((s,e)=>s+(e.days||0),0);
      document.getElementById('viewTotalDays').textContent=total;
      document.getElementById('viewSkiAgeBadge').textContent=getSkiAgeLabel(total);
      document.getElementById('viewOwnerLabel').textContent=`👁 瀏覽模式・共 ${entries.length} 筆`;
      const sorted=[...entries].sort((a,b)=>{const ak=a.dateStart||a.date||String(a.year||0),bk=b.dateStart||b.date||String(b.year||0);return bk.localeCompare(ak);});
      document.getElementById('viewEntriesList').innerHTML=sorted.length?sorted.map((e,i)=>entryCardHtml(e,sorted.length-i,false)).join(''):'<div class="empty-state"><div class="empty-icon">🏔</div>這裡還沒有紀錄</div>';
    }catch(e){document.getElementById('viewEntriesList').innerHTML='<div class="empty-state"><div class="empty-icon">😶</div>找不到分享紀錄，連結可能已失效</div>';}
  })();
}
</script>
