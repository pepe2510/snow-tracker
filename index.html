<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪齡計算器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc,
  doc, getDoc, query, orderBy, serverTimestamp, writeBatch, getDocs }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBFWZcPwH8D5rr5UJcUMOTQEZ6mzptkkFY",
  authDomain:        "snow-age-calculator.firebaseapp.com",
  projectId:         "snow-age-calculator",
  storageBucket:     "snow-age-calculator.firebasestorage.app",
  messagingSenderId: "527060791092",
  appId:             "1:527060791092:web:0e96e161c944016030ff61"
};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app), COL='ski-entries';
let unsubscribe=null;

onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('userEmail').textContent=user.email;
    const av=document.getElementById('userAvatar');
    if(av){av.src=user.photoURL||'';av.style.display=user.photoURL?'inline-block':'none';}
    startListening(user.uid);
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
    if(unsubscribe){unsubscribe();unsubscribe=null;}
    window.entries=[];hideLoading();
  }
});
function startListening(uid){
  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'users',uid,COL),orderBy('createdAt','asc')),
    snap=>{window.entries=snap.docs.map(d=>({id:d.id,...d.data()}));onDataUpdate();setSyncStatus('synced','已同步');hideLoading();},
    err=>{setSyncStatus('error','連線失敗');hideLoading();}
  );
}
window._fbSignIn=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){showToast('登入失敗：'+e.message);}};
window._fbSignOut=async()=>{if(!confirm('確定要登出？'))return;await signOut(auth);};
window._fbAdd=async(entry)=>{const uid=auth.currentUser?.uid;if(!uid)throw new Error('未登入');const{id,...data}=entry;await addDoc(collection(db,'users',uid,COL),{...data,createdAt:serverTimestamp()});};
window._fbUpdate=async(id,data)=>{const uid=auth.currentUser?.uid;if(!uid)throw new Error('未登入');await updateDoc(doc(db,'users',uid,COL,id),data);};
window._fbDelete=async(id)=>{const uid=auth.currentUser?.uid;if(!uid)throw new Error('未登入');await deleteDoc(doc(db,'users',uid,COL,id));};
window._fbClearAll=async()=>{const uid=auth.currentUser?.uid;if(!uid)throw new Error('未登入');const snap=await getDocs(collection(db,'users',uid,COL));const batch=writeBatch(db);snap.forEach(d=>batch.delete(d.ref));await batch.commit();};
window._fbPublishShare=async()=>{const uid=auth.currentUser?.uid;if(!uid)throw new Error('未登入');const snap=await getDocs(collection(db,'users',uid,COL));const data=snap.docs.map(d=>{const d2={...d.data()};delete d2.createdAt;return d2;});await setDoc(doc(db,'public_shares',uid),{uid,entries:data,updatedAt:serverTimestamp()});};
window._fbReadShare=async(uid)=>{const snap=await getDoc(doc(db,'public_shares',uid));if(!snap.exists())throw new Error('找不到分享紀錄');return snap.data();};
window._fbCurrentUid=()=>auth.currentUser?.uid||null;
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#2a3a55;
  --accent:#7dd3fc;--accent2:#38bdf8;--snow:#e0f2fe;--text:#cbd5e1;
  --muted:#64748b;--danger:#f87171;--success:#4ade80;
  --max:720px;--tap:48px;
}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}

/* Snow */
.snow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.flake{position:absolute;top:-20px;color:rgba(224,242,254,.2);animation:fall linear infinite;user-select:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

/* Loading */
.loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--snow);letter-spacing:.1em;}
.loading-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:.85rem;color:var(--muted);}

/* Toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(60px);background:#1e3a5f;border:1px solid var(--accent);border-radius:12px;padding:11px 22px;font-size:.88rem;color:var(--snow);transition:transform .3s;z-index:600;white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Login */
#loginScreen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:var(--bg);padding:20px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,15vw,7rem);color:var(--snow);letter-spacing:.08em;line-height:1;text-shadow:0 0 60px rgba(125,211,252,.5);}
.login-sub{color:var(--muted);font-size:.9rem;letter-spacing:.15em;margin-top:-16px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;text-align:center;width:100%;max-width:380px;}
.login-card h2{font-size:1.05rem;color:var(--snow);margin-bottom:8px;}
.login-card p{font-size:.85rem;color:var(--muted);margin-bottom:24px;line-height:1.7;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:15px 20px;background:#fff;border:none;border-radius:12px;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:#1f2937;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent;}
.btn-google:active{transform:scale(.97);}

/* ── Main app ── */
#mainApp{display:none;}
.page-wrap{max-width:var(--max);margin:0 auto;position:relative;z-index:1;}

/* Logo + total (always visible) */
.app-top{padding:24px 20px 0;text-align:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.6rem,9vw,5rem);letter-spacing:.08em;color:var(--snow);line-height:1;text-shadow:0 0 50px rgba(125,211,252,.4);}
.sub{font-size:.75rem;color:var(--muted);letter-spacing:.14em;margin-bottom:14px;}

.total-banner{background:linear-gradient(135deg,#0c3d5c,#142d47);border:1px solid rgba(56,189,248,.28);border-radius:16px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 0 28px rgba(56,189,248,.07);margin-bottom:0;}
.t-label{font-size:.72rem;color:var(--accent);letter-spacing:.08em;}
.t-days{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--snow);line-height:1;text-shadow:0 0 18px rgba(125,211,252,.4);}
.t-unit{font-size:.78rem;color:var(--muted);}
.t-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.age-badge{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.22);border-radius:8px;padding:4px 11px;font-size:.78rem;color:var(--accent);}
.sync-row{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .4s;}
.sync-dot.synced{background:var(--success);box-shadow:0 0 5px rgba(74,222,128,.5);}
.sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tab bar – Unified Style Modification */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg);
  padding: 10px 10px 0;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: none;
}
.tab-btn {
  flex: 1;
  padding: 14px 6px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.85rem;
  color: #888;
  letter-spacing: .04em;
  transition: all .3s ease;
  min-height: var(--tap);
}
.tab-btn.active {
  background: rgba(25, 33, 50, 0.8);
  color: var(--accent);
  font-weight: bold;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-bottom: 1px solid rgba(25, 33, 50, 0.8);
  box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.2);
  transform: translateY(1px);
}

/* Tab panes */
.tab-pane{display:none;padding:20px; background: rgba(25, 33, 50, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0 0 16px 16px; margin: 0 10px 110px;}
.tab-pane.active{display:block;}

/* User mini bar */
.user-bar{display:flex;align-items:center;gap:8px;padding:10px 0 6px;font-size:.74rem;color:var(--muted);}
.user-avatar{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);object-fit:cover;}
.user-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-signout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.68rem;padding:4px 10px;cursor:pointer;font-family:'Noto Serif TC',serif;min-height:30px;flex-shrink:0;}

/* Section headings */
.sh{font-size:.68rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:11px;}

/* Form */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:17px;margin-bottom:14px;}
.form-col{display:flex;flex-direction:column;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
label{font-size:.68rem;color:var(--muted);letter-spacing:.1em;}
input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-family:'Noto Serif TC',serif;font-size:1rem;outline:none;width:100%;min-height:var(--tap);-webkit-appearance:none;}
input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(56,189,248,.1);}
.btn-add{width:100%;margin-top:13px;background:linear-gradient(135deg,#0369a1,#0284c7);border:none;border-radius:12px;color:#fff;font-family:'Noto Serif TC',serif;font-size:1rem;padding:14px;cursor:pointer;min-height:var(--tap);-webkit-tap-highlight-color:transparent;}
.btn-add:active{opacity:.85;}.btn-add:disabled{opacity:.5;}

/* Calendar Specific Styles */
.cal-month-label { display: flex; align-items: center; justify-content: center; gap: 4px; }
.cal-year-select { background: transparent; color: var(--snow); border: none; font-size: 1.1rem; font-family: inherit; font-weight: bold; appearance: none; -webkit-appearance: none; cursor: pointer; outline: none; padding: 0 4px; }
.cal-year-select option { background: var(--surface); color: var(--text); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spin"></div>
</div>

<div id="loginScreen">
  <div class="login-logo">SNOW AGE</div>
  <div class="login-sub">雪齡計算器</div>
  <div class="login-card">
    <button class="btn-google" onclick="_fbSignIn()">使用 Google 登入</button>
  </div>
</div>

<div id="mainApp">
  <div class="page-wrap">
    
    <div class="app-top">
      <div class="logo">SNOW AGE</div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('logs')">我的雪歷</button>
      <button class="tab-btn" onclick="switchTab('stats')">雪齡統計</button>
    </div>

    <div class="tab-pane active" id="pane-logs">
      <div class="user-bar">
        <img id="userAvatar" class="user-avatar" src="" alt="">
        <div class="user-name" id="userEmail"></div>
        <button class="btn-signout" onclick="_fbSignOut()">登出</button>
      </div>
      
      <div class="form-card">
         <p>日誌表單區塊佔位</p>
      </div>
    </div>

    <div class="tab-pane" id="pane-stats">
      <div class="form-card">
        <p>統計圖表區塊佔位</p>
      </div>
    </div>

  </div>
</div>

<div class="cal-nav" style="display:none;">
  <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
  <div class="cal-month-label">
    <select id="calYearSelect" onchange="calChangeYear(this.value)" class="cal-year-select"></select>
    <span id="calMonthText"></span>
  </div>
  <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
</div>

<script>
// --- UI Control Logic ---
function switchTab(target) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('pane-' + target).classList.add('active');
}

function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// --- Calendar Year Logic ---
let calCurrDate = new Date();

window.initYearSelect = function() {
  const select = document.getElementById('calYearSelect');
  if (select && select.options.length === 0) {
    const currentYear = new Date().getFullYear();
    for (let y = 1990; y <= currentYear + 10; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.text = y + ' 年';
      select.appendChild(opt);
    }
  }
};

window.renderCal = function() {
  window.initYearSelect();
  const select = document.getElementById('calYearSelect');
  const monthText = document.getElementById('calMonthText');
  if(select && monthText) {
      select.value = calCurrDate.getFullYear();
      monthText.textContent = (calCurrDate.getMonth() + 1) + '月';
  }
};

window.calChangeYear = function(val) {
  calCurrDate.setFullYear(parseInt(val, 10));
  window.renderCal();
};

window.calPrevMonth = function() { calCurrDate.setMonth(calCurrDate.getMonth() - 1); window.renderCal(); };
window.calNextMonth = function() { calCurrDate.setMonth(calCurrDate.getMonth() + 1); window.renderCal(); };

// init
setTimeout(hideLoading, 1000); 
</script>

</body>
</html>
