<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪齡計算器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, browserLocalPersistence, setPersistence }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc,
    doc, getDoc, query, orderBy, serverTimestamp, writeBatch, getDocs }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // Configuration uses app specific domain. Fix for (auth/unauthorized-domain).
  const firebaseConfig = {
    apiKey:            "AIzaSyBFWZcPwH8D5rr5UJcUMOTQEZ6mzptkkFY",
    // Use window.location.hostname to automatically handle current domain, circumventing auth/unauthorized-domain issues.
    authDomain:        window.location.hostname === "localhost" ? "snow-age-calculator.firebaseapp.com" : window.location.hostname,
    projectId:         "snow-age-calculator",
    storageBucket:     "snow-age-calculator.firebasestorage.app",
    messagingSenderId: "123456789",
    appId:             "1:123456789:web:abcdef"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let unsubscribeSnapshots = null;
  let currentLogs = [];
  let userProfile = { goal: 0 };
  let currentSort = { field: 'dateStart', dir: 'desc' }; // 預設排序

  const snowIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M12 2v20M17 5l-5 5-5-5M22 12H2M19 17l-5-5-5 5M5 7l2 2M17 19l2 2"/></svg>`;

  document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    setupModals();
    setupListActions();
    setupSortHeaders();
    setupTabs();
  });

  async function initAuth() {
    const btnGoogle = document.getElementById('btnGoogleAuth');
    if(btnGoogle) {
      btnGoogle.addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        try {
          await setPersistence(auth, browserLocalPersistence);
          await signInWithPopup(auth, provider);
        } catch(err) {
            console.error('Login error:', err);
            // Provide a more user-friendly error message for common issues.
            if(err.code === 'auth/unauthorized-domain') {
                 alert('登入失敗: 此網域尚未獲得授權，請聯絡管理員設定。');
            } else {
                 alert('登入失敗: ' + err.message);
            }
        }
      });
    }

    const btnLogout = document.getElementById('btnLogout');
    if(btnLogout) {
      btnLogout.addEventListener('click', () => signOut(auth));
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      document.getElementById('screenLogin').style.display = user ? 'none' : 'flex';
      document.getElementById('screenApp').style.display = user ? 'flex' : 'none';

      if (user) {
        document.getElementById('userName').textContent = user.displayName || '雪友';
        if (user.photoURL) document.getElementById('userAvatar').src = user.photoURL;

        if (unsubscribeSnapshots) unsubscribeSnapshots();
        loadProfile();
        loadLogs();
      } else {
        if (unsubscribeSnapshots) { unsubscribeSnapshots(); unsubscribeSnapshots = null; }
        currentLogs = [];
      }
    });
  }

  async function loadProfile() {
    if (!currentUser) return;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'main');
    const snap = await getDoc(ref);
    if (snap.exists()) {
      userProfile = snap.data();
      document.getElementById('goalDays').value = userProfile.goal || '';
    }
  }

  async function updateProfileGoal(goalDays) {
     if (!currentUser) return;
     const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
     const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'main');
     await setDoc(ref, { goal: goalDays }, { merge: true });
     userProfile.goal = goalDays;
     updateSummaryUI();
  }

  function loadLogs() {
    if (!currentUser) return;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'logs');
    unsubscribeSnapshots = onSnapshot(q, (snapshot) => {
      currentLogs = [];
      snapshot.forEach(doc => { currentLogs.push({ id: doc.id, ...doc.data() }); });
      updateSummaryUI();
      renderLogLists(); // 更新為渲染列表
    }, (error) => {
      console.error("載入紀錄失敗:", error);
    });
  }

  function calcSnowAge(logs) {
    return logs.reduce((sum, log) => sum + (parseInt(log.days) || 0), 0);
  }

  function updateSummaryUI() {
    const totalAge = calcSnowAge(currentLogs);
    document.getElementById('totalSnowAge').textContent = totalAge;

    const currentYear = new Date().getFullYear();
    const currentYearLogs = currentLogs.filter(log => log.dateStart && log.dateStart.startsWith(currentYear.toString()));
    const yearAge = calcSnowAge(currentYearLogs);
    document.getElementById('yearSnowAge').textContent = yearAge;

    const goal = parseInt(userProfile.goal) || 0;
    const pgFill = document.getElementById('goalProgressFill');
    const pgText = document.getElementById('goalProgressText');
    const pgContainer = document.getElementById('goalProgressContainer');

    if (goal > 0) {
      pgContainer.style.display = 'block';
      let pct = Math.min((yearAge / goal) * 100, 100);
      pgFill.style.width = `${pct}%`;
      pgText.textContent = `年度目標：${yearAge} / ${goal} 天 (${Math.round(pct)}%)`;
      if(pct >= 100) pgFill.style.background = 'var(--accent1)'; // 達標換色
      else pgFill.style.background = 'var(--accent2)';
    } else {
      pgContainer.style.display = 'none';
    }

    // 更新最近三筆摘要
    const recentLogs = currentLogs.slice(0, 3);
    const recentContainer = document.getElementById('recentLogsContainer');
    if (recentLogs.length > 0) {
        recentContainer.innerHTML = recentLogs.map(log => `
            <div style="font-size:0.8rem; color:var(--text); margin-bottom:4px; display:flex; justify-content:space-between;">
                <span>${escHtml(log.resort)}</span>
                <span style="color:var(--muted)">${log.days}天</span>
            </div>
        `).join('');
    } else {
         recentContainer.innerHTML = '<div style="font-size:0.8rem; color:var(--muted);">尚無紀錄</div>';
    }
  }

  function sortLogs(logs) {
    return logs.slice().sort((a, b) => {
      let valA = a[currentSort.field];
      let valB = b[currentSort.field];

      if (currentSort.field === 'days') {
        valA = parseInt(valA) || 0;
        valB = parseInt(valB) || 0;
      }

      if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
      if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function renderLogLists() {
    const listLog = document.getElementById('listLog');
    if (!currentLogs.length) {
      listLog.innerHTML = `<div class="empty-state">尚無滑雪紀錄，點擊右下角「＋」新增</div>`;
      return;
    }

    const sortedLogs = sortLogs(currentLogs);
    listLog.innerHTML = sortedLogs.map(log => `
      <div class="log-item" data-id="${log.id}">
        <div class="log-main">
          <div class="log-title">${escHtml(log.resort)}</div>
          <div class="log-meta">
            ${(log.country || log.area) ? `📍 ${[log.country, log.area].filter(Boolean).join(' · ')}<br>` : ''}
            📅 ${log.dateStart || '?'} ${log.dateEnd ? '～ ' + log.dateEnd : ''}
            ${log.note ? `<br>📝 ${escHtml(log.note)}` : ''}
          </div>
        </div>
        <div class="log-days-box">
          <div class="log-days">${log.days}</div>
          <div style="font-size:0.7rem; color:var(--muted); margin-top:2px;">Days</div>
        </div>
      </div>
    `).join('');
  }

  function setupTabs() {
      const tabs = document.querySelectorAll('.tab');
      const tabContents = document.querySelectorAll('.tab-content');

      tabs.forEach(tab => {
          tab.addEventListener('click', () => {
              // 移除所有 active class
              tabs.forEach(t => t.classList.remove('active'));
              tabContents.forEach(c => c.classList.remove('active'));

              // 加入 active class 到點擊的 tab
              tab.classList.add('active');
              const targetId = tab.getAttribute('data-target');
              document.getElementById(targetId).classList.add('active');
          });
      });
  }

  function setupSortHeaders() {
    const headers = document.querySelectorAll('.sort-header');
    headers.forEach(header => {
      header.addEventListener('click', () => {
        const field = header.dataset.sort;
        if (currentSort.field === field) {
          currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.field = field;
          currentSort.dir = 'desc'; // 預設降冪
        }

        // 更新 UI 箭頭
        headers.forEach(h => {
          h.classList.remove('asc', 'desc');
          if (h.dataset.sort === currentSort.field) {
            h.classList.add(currentSort.dir);
          }
        });

        renderLogLists();
      });
    });
  }


  function setupModals() {
    // New/Edit Log Modal
    const modalLog = document.getElementById('modalLog');
    document.getElementById('btnFab').addEventListener('click', () => openLogModal());
    document.getElementById('btnCloseLog').addEventListener('click', () => modalLog.style.display = 'none');

    // Save Log
    document.getElementById('btnSaveLog').addEventListener('click', async () => {
      const id = document.getElementById('logId').value;
      const data = {
        resort: document.getElementById('inpResort').value.trim(),
        country: document.getElementById('inpCountry').value.trim(),
        area: document.getElementById('inpArea').value.trim(),
        dateStart: document.getElementById('inpDateStart').value,
        dateEnd: document.getElementById('inpDateEnd').value,
        days: parseInt(document.getElementById('inpDays').value) || 0,
        note: document.getElementById('inpNote').value.trim()
      };

      if (!data.resort || !data.dateStart || data.days <= 0) {
        alert('雪場、開始日期與天數(需>0)為必填');
        return;
      }
      if(data.dateEnd && data.dateEnd < data.dateStart) {
          alert('結束日期不能早於開始日期');
          return;
      }

      const btn = document.getElementById('btnSaveLog');
      btn.disabled = true; btn.textContent = '儲存中...';

      const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

      try {
        if (id) {
          await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'logs', id), { ...data, updatedAt: serverTimestamp() });
        } else {
          await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'logs'), { ...data, createdAt: serverTimestamp() });
        }
        modalLog.style.display = 'none';
      } catch (err) {
        console.error(err); alert('儲存失敗');
      } finally {
        btn.disabled = false; btn.textContent = '儲存紀錄';
      }
    });

    // Delete Log
    document.getElementById('btnDelLog').addEventListener('click', async () => {
      const id = document.getElementById('logId').value;
      if (!id || !confirm('確定要刪除這筆紀錄嗎？')) return;
      
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
      
      try {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'logs', id));
        modalLog.style.display = 'none';
      } catch(err) { console.error(err); alert('刪除失敗'); }
    });

    // Profile Modal
    const modalProfile = document.getElementById('modalProfile');
    document.getElementById('btnProfile').addEventListener('click', () => {
        document.getElementById('goalDays').value = userProfile.goal || '';
        modalProfile.style.display = 'flex';
    });
    document.getElementById('btnCloseProfile').addEventListener('click', () => modalProfile.style.display = 'none');
    document.getElementById('btnSaveProfile').addEventListener('click', () => {
        const goal = parseInt(document.getElementById('goalDays').value) || 0;
        updateProfileGoal(goal);
        modalProfile.style.display = 'none';
    });

    // Auto calculate days when dates change (simple logic)
    const inpStart = document.getElementById('inpDateStart');
    const inpEnd = document.getElementById('inpDateEnd');
    const inpDays = document.getElementById('inpDays');
    const calcDays = () => {
        if(inpStart.value && inpEnd.value) {
            const start = new Date(inpStart.value);
            const end = new Date(inpEnd.value);
            if(end >= start) {
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // 包含頭尾
                inpDays.value = diffDays;
            }
        } else if (inpStart.value && !inpEnd.value) {
            inpDays.value = 1;
        }
    };
    inpStart.addEventListener('change', calcDays);
    inpEnd.addEventListener('change', calcDays);
  }

  function setupListActions() {
    document.getElementById('listLog').addEventListener('click', (e) => {
      const item = e.target.closest('.log-item');
      if (!item) return;
      const id = item.dataset.id;
      const log = currentLogs.find(l => l.id === id);
      if (log) openLogModal(log);
    });
  }

  function openLogModal(log = null) {
    const modal = document.getElementById('modalLog');
    const title = document.getElementById('modalLogTitle');
    const btnDel = document.getElementById('btnDelLog');

    if (log) {
      title.textContent = '編輯紀錄';
      document.getElementById('logId').value = log.id;
      document.getElementById('inpResort').value = log.resort || '';
      document.getElementById('inpCountry').value = log.country || '';
      document.getElementById('inpArea').value = log.area || '';
      document.getElementById('inpDateStart').value = log.dateStart || '';
      document.getElementById('inpDateEnd').value = log.dateEnd || '';
      document.getElementById('inpDays').value = log.days || '';
      document.getElementById('inpNote').value = log.note || '';
      btnDel.style.display = 'block';
    } else {
      title.textContent = '新增紀錄';
      document.getElementById('logId').value = '';
      document.getElementById('inpResort').value = '';
      document.getElementById('inpCountry').value = '日本'; // 預設
      document.getElementById('inpArea').value = '';
      document.getElementById('inpDateStart').value = new Date().toISOString().split('T')[0];
      document.getElementById('inpDateEnd').value = '';
      document.getElementById('inpDays').value = '1';
      document.getElementById('inpNote').value = '';
      btnDel.style.display = 'none';
    }
    modal.style.display = 'flex';
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>'"]/g, tag => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag] || tag));
  }

</script>

<style>
  :root {
    --bg: #0f172a;       /* slate-900 */
    --surface: #1e293b;  /* slate-800 */
    --surface-hover: #334155;
    --primary: #38bdf8;  /* sky-400 */
    --accent1: #818cf8;  /* indigo-400 */
    --accent2: #fbbf24;  /* amber-400 */
    --danger: #f87171;   /* red-400 */
    --text: #f8fafc;     /* slate-50 */
    --muted: #94a3b8;    /* slate-400 */
    --border: #334155;   /* slate-700 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Login Screen */
  #screenLogin { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); padding: 20px; text-align: center; }
  .login-title { font-family: 'Noto Serif TC', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .login-subtitle { color: var(--muted); margin-bottom: 40px; font-size: 1.1rem; }
  .btn-google { display: flex; align-items: center; gap: 12px; background: #fff; color: #333; padding: 14px 28px; border-radius: 30px; font-size: 1.1rem; font-weight: 600; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; border: none; transition: transform 0.2s; }
  .btn-google:active { transform: scale(0.95); }
  .btn-google img { width: 24px; height: 24px; }

  /* App Screen */
  #screenApp { flex: 1; display: none; flex-direction: column; max-width: 600px; margin: 0 auto; width: 100%; position: relative; }

  /* Header */
  .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; }
  .header-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .header-user img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary); }
  .header-user span { font-weight: 600; font-size: 1.1rem; }
  .header-actions { display: flex; gap: 15px; }
  .header-icon { color: var(--muted); cursor: pointer; padding: 4px; transition: color 0.2s; }
  .header-icon:hover, .header-icon:active { color: var(--text); }

  /* Dashboard (Tab 1 Summary) */
  .dashboard { padding: 20px; background: linear-gradient(to bottom, var(--surface) 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; text-align: center; }
  .stat-card-title { font-size: 0.85rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card-val { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--primary); line-height: 1; text-shadow: 0 2px 10px rgba(56,189,248,0.2); }
  .stat-card-unit { font-size: 1rem; color: var(--text); margin-left: 4px; }

  /* Goal Progress */
  .goal-container { margin-bottom: 15px; }
  .goal-bar-bg { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-bottom: 6px; }
  .goal-bar-fill { height: 100%; background: var(--accent2); width: 0%; transition: width 0.5s ease-out, background-color 0.3s; }
  .goal-text { font-size: 0.75rem; color: var(--muted); text-align: right; }

  /* Recent Logs Summary */
  .recent-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; }
  .recent-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px;}

  /* Tabs */
  .tabs-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 12px 0; color: var(--muted); font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(56,189,248,0.05); }

  .tab-content { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
  .tab-content.active { display: block; }


  /* List Area */
  .list-header { display: flex; padding: 10px 20px; background: var(--bg); position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
  .sort-header { cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; }
  .sort-header:hover { color: var(--text); }
  .sort-header::after { content: '↕'; font-size: 0.7rem; opacity: 0.5; }
  .sort-header.asc::after { content: '↑'; opacity: 1; color: var(--primary); }
  .sort-header.desc::after { content: '↓'; opacity: 1; color: var(--primary); }
  .col-main { flex: 1; }
  .col-days { width: 60px; text-align: center; justify-content: center; }

  .log-list { display: flex; flex-direction: column; }
  .log-item { display: flex; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.2s; align-items: center; }
  .log-item:hover, .log-item:active { background: var(--surface-hover); }
  .log-main { flex: 1; padding-right: 15px; }
  .log-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .log-meta { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
  .log-days-box { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(56,189,248,0.1); border-radius: 12px; padding: 10px 0; }
  .log-days { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--primary); line-height: 1; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9rem; }

  /* FAB */
  .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 30px; background: var(--primary); color: #000; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 20px rgba(56,189,248,0.4); cursor: pointer; border: none; z-index: 20; transition: transform 0.2s; }
  .fab:active { transform: scale(0.9); }

  /* Modals */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-content { background: var(--surface); width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 1.2rem; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
  .modal-body { padding: 20px; overflow-y: auto; }
  
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
  .form-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 1rem; transition: border-color 0.2s; }
  .form-control:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.3); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; text-align: center; }
  .btn-primary { background: var(--primary); color: #000; }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--danger); }
  
  @media (min-width: 600px) {
    #screenApp { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .fab { position: absolute; }
  }
</style>
</head>
<body>

  <!-- Login Screen -->
  <div id="screenLogin">
    <div class="login-title">雪齡計算器</div>
    <div class="login-subtitle">記錄你的每一趟滑雪旅程</div>
    <button id="btnGoogleAuth" class="btn-google">
      <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
      使用 Google 登入
    </button>
  </div>

  <!-- Main App Screen -->
  <div id="screenApp">
    
    <header class="app-header">
      <div class="header-user" id="btnProfile">
        <img id="userAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" alt="User">
        <span id="userName">載入中...</span>
      </div>
      <div class="header-actions">
        <!-- Profile Icon mapped to Logout for now for simplicity, or keep inside Profile Modal -->
        <svg id="btnLogout" class="header-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </div>
    </header>

    <div class="tabs-nav">
        <div class="tab active" data-target="tabDashboard">總覽紀錄</div>
        <div class="tab" data-target="tabAllLogs">全部紀錄</div>
    </div>

    <!-- Tab 1: Dashboard & Recent -->
    <div id="tabDashboard" class="tab-content active">
        <div class="dashboard">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-card-title">總雪齡</div>
              <div class="stat-card-val"><span id="totalSnowAge">0</span><span class="stat-card-unit">天</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-card-title">本季/年度雪齡</div>
              <div class="stat-card-val" style="color:var(--accent2);"><span id="yearSnowAge">0</span><span class="stat-card-unit">天</span></div>
            </div>
          </div>
          
          <div id="goalProgressContainer" class="goal-container" style="display:none;">
            <div class="goal-bar-bg">
              <div id="goalProgressFill" class="goal-bar-fill"></div>
            </div>
            <div id="goalProgressText" class="goal-text">年度目標：0 / 0 天</div>
          </div>

          <div class="recent-summary">
              <div class="recent-title">最新三筆紀錄</div>
              <div id="recentLogsContainer">
                  <!-- Recent logs injected here -->
              </div>
          </div>
        </div>
    </div>

    <!-- Tab 2: All Logs -->
    <div id="tabAllLogs" class="tab-content">
        <div class="list-header">
          <div class="col-main sort-header" data-sort="dateStart">日期與雪場</div>
          <div class="col-days sort-header" data-sort="days">天數</div>
        </div>
        <div id="listLog" class="log-list">
          <!-- Logs injected here -->
          <div class="empty-state">載入中...</div>
        </div>
    </div>

    <button id="btnFab" class="fab">＋</button>

  </div>

  <!-- Log Form Modal -->
  <div id="modalLog" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div id="modalLogTitle" class="modal-title">新增紀錄</div>
        <button id="btnCloseLog" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="logId">
        
        <div class="form-group">
          <label>雪場名稱 *</label>
          <input type="text" id="inpResort" class="form-control" placeholder="例：野澤溫泉">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>國家</label>
            <input type="text" id="inpCountry" class="form-control" placeholder="例：日本" value="日本">
          </div>
          <div class="form-group">
            <label>地區</label>
            <input type="text" id="inpArea" class="form-control" placeholder="例：長野">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>開始日期 *</label>
            <input type="date" id="inpDateStart" class="form-control">
          </div>
          <div class="form-group">
            <label>結束日期</label>
            <input type="date" id="inpDateEnd" class="form-control">
          </div>
        </div>
        
        <div class="form-group">
          <label>滑雪天數 *</label>
          <input type="number" id="inpDays" class="form-control" min="1" value="1">
        </div>

        <div class="form-group">
          <label>備註</label>
          <textarea id="inpNote" class="form-control" rows="2" placeholder="天氣、雪況或心得..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnDelLog" class="btn btn-danger" style="display:none;">刪除</button>
        <button id="btnSaveLog" class="btn btn-primary">儲存紀錄</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="modalProfile" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">個人設定</div>
        <button id="btnCloseProfile" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>年度滑雪目標天數 (0表示不設定)</label>
          <input type="number" id="goalDays" class="form-control" min="0" placeholder="例如：20">
        </div>
        <div style="font-size:0.8rem; color:var(--muted); margin-top:10px;">
            此目標將顯示在總覽畫面的進度條中。
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnSaveProfile" class="btn btn-primary">儲存設定</button>
      </div>
    </div>
  </div>

</body>
</html>
