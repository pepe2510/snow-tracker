<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪歷 · SKI DAYS TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
  reauthenticateWithPopup, deleteUser }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc,
  doc, getDoc, query, orderBy, serverTimestamp, writeBatch, getDocs }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBFWZcPwH8D5rr5UJcUMOTQEZ6mzptkkFY",
  authDomain:        "snow-age-calculator.firebaseapp.com",
  projectId:         "snow-age-calculator",
  storageBucket:     "snow-age-calculator.firebasestorage.app",
  messagingSenderId: "527060791092",
  appId:             "1:527060791092:web:0e96e161c944016030ff61"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const COL = 'ski-entries';
let unsubscribe = null;

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
    const av = document.getElementById('userAvatar');
    av.src = user.photoURL || '';
    av.style.display = user.photoURL ? 'block' : 'none';
    startListening(user.uid);
  } else {
    if (!document.getElementById('loginScreen').dataset.viewMode) {
      document.getElementById('loginScreen').style.display = 'flex';
    }
    document.getElementById('mainApp').style.display = 'none';
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    window.entries = [];
    hideLoading();
  }
});

function startListening(uid) {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(
    query(collection(db, 'users', uid, COL), orderBy('createdAt', 'asc')),
    snap => {
      window.entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
      updateFilterOptions();
      setSyncStatus('synced', '已同步');
      hideLoading();
    },
    () => { setSyncStatus('error', '連線失敗'); hideLoading(); }
  );
}

window._fbSignIn = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch (e) { showToast('登入失敗：' + e.message); }
};
window._fbSignOut = async () => {
  if (!confirm('確定要登出？')) return;
  await signOut(auth);
};
window._fbAdd = async entry => {
  const uid = auth.currentUser?.uid;
  if (!uid) throw new Error('未登入');
  await addDoc(collection(db, 'users', uid, COL), { ...entry, createdAt: serverTimestamp() });
};
window._fbUpdate = async (id, data) => {
  const uid = auth.currentUser?.uid;
  if (!uid) throw new Error('未登入');
  await updateDoc(doc(db, 'users', uid, COL, id), data);
};
window._fbDelete = async id => {
  const uid = auth.currentUser?.uid;
  if (!uid) throw new Error('未登入');
  await deleteDoc(doc(db, 'users', uid, COL, id));
};
window._fbClearAll = async () => {
  const uid = auth.currentUser?.uid;
  if (!uid) throw new Error('未登入');
  const snap = await getDocs(collection(db, 'users', uid, COL));
  const batch = writeBatch(db);
  snap.forEach(d => batch.delete(d.ref));
  await batch.commit();
};
window._fbPublishShare = async () => {
  const uid = auth.currentUser?.uid;
  if (!uid) throw new Error('未登入');
  const snap = await getDocs(collection(db, 'users', uid, COL));
  const data = snap.docs.map(d => { const d2 = { ...d.data(), id: d.id }; delete d2.createdAt; return d2; });
  await setDoc(doc(db, 'public_shares', uid), { uid, entries: data, updatedAt: serverTimestamp() });
};
window._fbReadShare = async uid => {
  const snap = await getDoc(doc(db, 'public_shares', uid));
  if (!snap.exists()) throw new Error('找不到分享紀錄');
  return snap.data();
};
window._fbDeleteAccount = async () => {
  const user = auth.currentUser;
  if (!user) throw new Error('未登入');
  const uid = user.uid;

  // Step 1: re-authenticate (Google login is "recent login" sensitive)
  try {
    await reauthenticateWithPopup(user, new GoogleAuthProvider());
  } catch(e) {
    throw new Error('重新驗證失敗：' + e.message);
  }

  // Step 2: delete all Firestore data
  try {
    const snap = await getDocs(collection(db, 'users', uid, COL));
    const batch = writeBatch(db);
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    // also remove public share if exists
    await deleteDoc(doc(db, 'public_shares', uid)).catch(() => {});
  } catch(e) {
    throw new Error('刪除資料失敗：' + e.message);
  }

  // Step 3: delete Auth account
  await deleteUser(user);
};
window._fbCurrentUid = () => auth.currentUser?.uid || null;
</script>

.entry-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:border-color .2s; }
.entry-card:active { border-color:var(--accent2); background:#1f2d42; }
.entry-num { font-family
